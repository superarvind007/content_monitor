name: Monitor ClassForKids

on:
  schedule:
    # Runs every 11 minutes (slight change to reset GitHub's schedule)
    - cron: '*/11 * * * *'
  # Allow manual trigger from GitHub Actions UI
  # workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Install Python dependencies
        run: pip install selenium

      - name: Restore monitor state
        id: cache-state
        uses: actions/cache@v4
        with:
          path: .classforkids_state.json
          key: monitor-state-${{ github.run_id }}
          restore-keys: monitor-state-

      - name: Run monitor check
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python monitor.py
